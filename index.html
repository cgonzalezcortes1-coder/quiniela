      --rojo:          #d50000;
      --rojo-lite:     #ffeaea;
      --amarillo:      #e08800;
      --amarillo-lite: #fff8e1;
      --fondo:         #f2f3f7;
      --card:          #ffffff;
      --borde:         #dde0e8;
      --texto:         #1a1a2e;
      --gris:          #7b7b9a;
      --gris-lite:     #f0f1f6;
      --acento:        #1e3a5f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--fondo); color: var(--texto); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* HEADER */
    header {
      background: var(--acento);
      padding: 15px 20px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
    }
    .logo { width: 44px; height: 44px; background: var(--verde); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .header-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(20px,5vw,30px); letter-spacing: 2px; color: #fff; line-height: 1; }
    .header-text p  { font-size: 11px; color: rgba(255,255,255,.55); letter-spacing: 1px; text-transform: uppercase; }

    /* MAIN */
    main { max-width: 680px; margin: 0 auto; padding: 22px 16px 100px; }

    /* CARDS GENERALES */
    .card {
      background: var(--card);
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .card label {
      display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--gris); margin-bottom: 10px; font-weight: 700;
    }

    /* NOMBRE */
    .card input[type=text] {
      width: 100%; background: var(--gris-lite); border: 1.5px solid var(--borde);
      border-radius: 10px; padding: 13px 16px; font-size: 17px;
      font-family: 'Inter',sans-serif; font-weight: 600; color: var(--texto); outline: none;
      transition: border-color .2s;
    }
    .card input[type=text]:focus { border-color: var(--verde); background: #fff; }

    /* TABS JORNADA */
    .jornada-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
    .jornada-tab {
      padding: 7px 13px; border-radius: 30px; border: 1.5px solid var(--borde);
      background: var(--gris-lite); font-size: 12px; font-weight: 700; color: var(--gris);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .jornada-tab:hover { border-color: var(--verde); color: var(--verde); background: var(--verde-lite); }
    .jornada-tab.activo { background: var(--acento); border-color: var(--acento); color: #fff; }

    /* TÍTULO JORNADA */
    .jornada-title {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 12px; padding: 0 2px;
    }
    .jornada-title h2 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--acento); }
    .jornada-title .fechas { font-size: 12px; color: var(--gris); text-transform: uppercase; }

    /* PARTIDO */
    .partido {
      background: var(--card); border: 1.5px solid var(--borde); border-radius: 14px;
      margin-bottom: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      transition: border-color .2s, box-shadow .2s;
    }
    .partido.seleccionado { border-color: var(--verde); box-shadow: 0 2px 14px rgba(0,168,69,.12); }
    .partido-fecha {
      background: var(--gris-lite); padding: 5px 14px; font-size: 11px;
      color: var(--gris); letter-spacing: .5px; text-transform: uppercase;
      border-bottom: 1px solid var(--borde); font-weight: 700;
    }
    .partido-equipos { display: flex; align-items: center; padding: 14px 16px; gap: 10px; }
    .equipo { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
    .equipo-escudo {
      width: 44px; height: 44px; border-radius: 50%; object-fit: contain;
      background: var(--gris-lite); padding: 4px; border: 1px solid var(--borde);
    }
    .equipo-nombre { font-size: 12px; font-weight: 700; color: var(--texto); line-height: 1.2; }
    .vs { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gris); flex-shrink: 0; }
    .nota-pendiente {
      background: var(--amarillo-lite); border-top: 1px solid #ffe082;
      padding: 5px 14px; font-size: 11px; color: var(--amarillo);
      font-weight: 700; text-align: center;
    }

    /* OPCIONES */
    .opciones { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--borde); }
    .opcion {
      padding: 11px 6px; text-align: center; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
      color: var(--gris); border: none; background: transparent;
      transition: background .12s, color .12s; position: relative;
    }
    .opcion:not(:last-child)::after { content:''; position:absolute; right:0; top:20%; bottom:20%; width:1px; background:var(--borde); }
    .opcion:hover { background: var(--gris-lite); color: var(--texto); }
    .opcion.local.activo   { background: var(--verde-lite);    color: var(--verde);    font-weight: 800; }
    .opcion.empate.activo  { background: var(--amarillo-lite); color: var(--amarillo); font-weight: 800; }
    .opcion.visita.activo  { background: var(--rojo-lite);     color: var(--rojo);     font-weight: 800; }
    .opcion .icono { font-size: 15px; display: block; margin-bottom: 2px; }

    /* PROGRESO */
    .progreso {
      background: var(--card); border: 1px solid var(--borde); border-radius: 14px;
      padding: 14px 18px; margin: 18px 0 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .progreso-barra-wrap { flex: 1; background: var(--gris-lite); border-radius: 6px; height: 8px; overflow: hidden; }
    .progreso-barra { height: 100%; background: linear-gradient(90deg,#009636,#00c853); border-radius: 6px; transition: width .3s; }
    .progreso-texto { font-size: 13px; font-weight: 700; color: var(--verde); white-space: nowrap; }

    /* BTN GENERAR */
    .btn-generar {
      width: 100%; padding: 17px; background: var(--acento); border: none; border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: #fff;
      cursor: pointer; transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 18px rgba(30,58,95,.25);
    }
    .btn-generar:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .btn-generar:active:not(:disabled) { transform: translateY(0); }
    .btn-generar:disabled { opacity: .3; cursor: not-allowed; }

    /* ── CAPTURA OCULTA ── */
    #captura {
      position: fixed; top: -9999px; left: -9999px; width: 660px;
      background: #ffffff; padding: 28px; font-family: 'Inter', sans-serif;
    }
    .cap-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 3px solid var(--acento); }
    .cap-logo { width: 44px; height: 44px; background: var(--verde); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .cap-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--acento); line-height: 1; }
    .cap-sub { font-size: 11px; color: var(--gris); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .cap-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .cap-nombre { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--acento); }
    .cap-fecha { font-size: 11px; color: var(--gris); text-align: right; line-height: 1.5; }
    .cap-partido { display: flex; align-items: center; justify-content: space-between; background: var(--gris-lite); border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
    .cap-equipos { font-size: 13px; font-weight: 600; color: var(--texto); flex: 1; }
    .cap-equipos span { color: var(--gris); margin: 0 4px; }
    .cap-sel { font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 4px 11px; border-radius: 20px; text-transform: uppercase; flex-shrink: 0; }
    .cap-sel.local   { background: var(--verde-lite);    color: var(--verde); }
    .cap-sel.empate  { background: var(--amarillo-lite); color: var(--amarillo); }
    .cap-sel.visita  { background: var(--rojo-lite);     color: var(--rojo); }
    .cap-sel.vacio   { background: #eee; color: var(--gris); }
    .cap-footer { margin-top: 16px; padding-top: 10px; border-top: 1px solid var(--borde); font-size: 10px; color: var(--gris); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .cap-footer-text { flex: 1; text-align: left; }
    .cap-qr { flex-shrink: 0; }

    .modal-overlay.visible { display: flex; }

    .modal-box h3 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--acento); margin-bottom: 4px; }
    .modal-box p { font-size: 13px; color: var(--gris); margin-bottom: 14px; }
    .modal-box img { width: 100%; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--borde); }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-dl { padding: 12px 26px; background: var(--acento); color: #fff; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; }
    .btn-dl:hover { opacity: .85; }
    .btn-cerrar { padding: 12px 20px; background: var(--gris-lite); color: var(--gris); border: 1px solid var(--borde); border-radius: 10px; font-size: 14px; cursor: pointer; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--acento); color: #fff; padding: 11px 22px; border-radius: 30px; font-weight: 700; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .equipo-nombre { font-size: 11px; }
      .jornada-tab { font-size: 11px; padding: 6px 10px; }
    }
  </style>
</head>

      { id:"17-3", fecha:"Sáb 25 Abr · 17:00",  local:"Mazatlán",      visita:"Toluca"        },
      { id:"17-4", fecha:"Sáb 25 Abr · 17:00",  local:"Querétaro",     visita:"Cruz Azul"     },
      { id:"17-5", fecha:"Sáb 25 Abr · 19:00",  local:"Chivas",        visita:"Xolos Tijuana" },
      { id:"17-6", fecha:"Sáb 25 Abr · 19:00",  local:"León",          visita:"At. San Luis"  },
      { id:"17-7", fecha:"Sáb 25 Abr · 21:00",  local:"Monterrey",     visita:"FC Juárez"     },
      { id:"17-8", fecha:"Dom 26 Abr · 17:00",   local:"Puebla",       visita:"Pumas"         },
      { id:"17-9", fecha:"Dom 26 Abr · 19:00",   local:"Tigres",       visita:"América"       },

};

// Escudos Wikipedia SVG

  "América":        "https://upload.wikimedia.org/wikipedia/en/thumb/5/53/Club_America_badge.svg/80px-Club_America_badge.svg.png",
  "Atlas":          "https://upload.wikimedia.org/wikipedia/en/thumb/1/16/Atlas_F.C._logo.svg/80px-Atlas_F.C._logo.svg.png",
  "At. San Luis":   "https://upload.wikimedia.org/wikipedia/en/thumb/d/d5/Atletico_San_Luis_logo.svg/80px-Atletico_San_Luis_logo.svg.png",
  "Chivas":         "https://upload.wikimedia.org/wikipedia/en/thumb/5/58/Guadalajara_Chivas_logo.svg/80px-Guadalajara_Chivas_logo.svg.png",
  "Cruz Azul":      "https://upload.wikimedia.org/wikipedia/en/thumb/7/76/Cruz_Azul_logo.svg/80px-Cruz_Azul_logo.svg.png",

function getEscudo(equipo) {
  return ESCUDOS[equipo] || `https://ui-avatars.com/api/?name=${encodeURIComponent(equipo)}&background=e0e0e8&color=1a1a2e&size=80&bold=true&font-size=0.35`;
}

// ── ESTADO ──
let jornadaActual = 9;
const selecciones = {};   // { jornadaNum: { "id": "local"|"empate"|"visita" } }

// ── RENDER TABS ──
function renderTabs() {
  const cont = document.getElementById('tabs');
  cont.innerHTML = '';
  Object.entries(JORNADAS).forEach(([num, data]) => {
    const n = parseInt(num);
    const btn = document.createElement('button');
    btn.className = 'jornada-tab' + (n === jornadaActual ? ' activo' : '');
    btn.innerHTML = `J${n} <span style="font-weight:400;opacity:.7">(${data.fechas})</span>`;
    btn.addEventListener('click', () => { jornadaActual = n; renderTabs(); renderPartidos(); });
    cont.appendChild(btn);
  });
}

// ── RENDER PARTIDOS ──
function renderPartidos() {
  const j = JORNADAS[jornadaActual];
  document.getElementById('jornada-titulo').textContent = j.titulo;
  document.getElementById('jornada-fechas').textContent = j.fechas;

  if (!selecciones[jornadaActual]) selecciones[jornadaActual] = {};
  const sels = selecciones[jornadaActual];

  const cont = document.getElementById('partidos');
  cont.innerHTML = '';

  j.partidos.forEach(p => {
    const ya = sels[p.id];
    const div = document.createElement('div');
    div.className = 'partido' + (ya ? ' seleccionado' : '');
    div.id = `partido-${p.id}`;
    div.innerHTML = `
      <div class="partido-fecha">${p.fecha}</div>
      <div class="partido-equipos">
        <div class="equipo">
          <img class="equipo-escudo" src="${getEscudo(p.local)}" alt="${p.local}" onerror="this.src='${getEscudo(p.local)}'">
          <div class="equipo-nombre">${p.local}</div>
        </div>
        <div class="vs">VS</div>
        <div class="equipo">
          <img class="equipo-escudo" src="${getEscudo(p.visita)}" alt="${p.visita}" onerror="this.src='${getEscudo(p.visita)}'">
          <div class="equipo-nombre">${p.visita}</div>
        </div>
      </div>
      ${p.pendiente ? `<div class="nota-pendiente">⚠️ Partido pendiente — fecha sujeta a cambio</div>` : ''}
      <div class="opciones">
        <button class="opcion local${ya==='local'?' activo':''}"   data-id="${p.id}" data-sel="local"><span class="icono">🏠</span>Local</button>
        <button class="opcion empate${ya==='empate'?' activo':''}" data-id="${p.id}" data-sel="empate"><span class="icono">🤝</span>Empate</button>
        <button class="opcion visita${ya==='visita'?' activo':''}" data-id="${p.id}" data-sel="visita"><span class="icono">✈️</span>Visita</button>
      </div>`;
    cont.appendChild(div);
  });

  cont.querySelectorAll('.opcion').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id, sel = btn.dataset.sel;
      selecciones[jornadaActual][id] = sel;
      const card = document.getElementById(`partido-${id}`);
      card.querySelectorAll('.opcion').forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
      card.classList.add('seleccionado');
      actualizarProgreso();
    });
  });

  actualizarProgreso();
}

function actualizarProgreso() {
  const total = JORNADAS[jornadaActual].partidos.length;
  const n = Object.keys(selecciones[jornadaActual] || {}).length;
  document.getElementById('barra').style.width = (n / total * 100) + '%';
  document.getElementById('progreso-txt').textContent = `${n} / ${total}`;
  const nombre = document.getElementById('nombre').value.trim();
  document.getElementById('btn-gen').disabled = (n < total || !nombre);
}

document.getElementById('nombre').addEventListener('input', actualizarProgreso);

// ── HORA CDMX ──
async function getHoraCDMX() {
  try {
    const r = await fetch('https://worldtimeapi.org/api/timezone/America/Mexico_City');
    const d = await r.json();
    return new Date(d.datetime).toLocaleString('es-MX', { timeZone:'America/Mexico_City', weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
  } catch {
    return new Date().toLocaleString('es-MX', { timeZone:'America/Mexico_City', weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
  }
}

// ── GENERAR ──
let imgDataUrl = '';

document.getElementById('btn-gen').addEventListener('click', async () => {
  const nombre = document.getElementById('nombre').value.trim();
  const hora = await getHoraCDMX();
  const j = JORNADAS[jornadaActual];
  const sels = selecciones[jornadaActual] || {};
  const etiq = { local:'Local', empate:'Empate', visita:'Visita' };

  const filas = j.partidos.map(p => {
    const sel = sels[p.id];
    return `<div class="cap-partido">
      <div class="cap-equipos">${p.local} <span>vs</span> ${p.visita}</div>
      <div class="cap-sel ${sel||'vacio'}">${sel ? etiq[sel] : '—'}</div>
    </div>`;
  }).join('');

  // ── CSV para el QR ──
  // formato: nombre,jornada,pick1,pick2,...,pickN
  // picks: L / E / V
  const csvPicks = j.partidos.map(p => {
    const s = sels[p.id];
    return s === 'local' ? 'L' : s === 'empate' ? 'E' : s === 'visita' ? 'V' : '';
  }).join(',');
  const csvData = `${nombre},J${jornadaActual},${csvPicks}`;

  // Renderizar captura con placeholder para el QR
  document.getElementById('captura').innerHTML = `
    <div class="cap-header">
      <div class="cap-logo">⚽</div>
      <div>
        <div class="cap-titulo">Quiniela Liga MX</div>
        <div class="cap-sub">Clausura 2026 · ${j.titulo} (${j.fechas})</div>
      </div>
    </div>
    <div class="cap-meta">
      <div class="cap-nombre">👤 ${nombre}</div>
      <div class="cap-fecha">📅 ${hora}<br>Hora Ciudad de México</div>
    </div>
    ${filas}
    <div class="cap-footer">
      <div class="cap-footer-text">Quiniela Liga MX · Clausura 2026</div>
      <div class="cap-qr" id="qr-container"></div>
    </div>`;

  // Generar QR dentro del div de captura
  new QRCode(document.getElementById('qr-container'), {
    text: csvData,
    width: 72,
    height: 72,
    colorDark: '#1e3a5f',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Esperar a que el QR se renderice antes de capturar
  await new Promise(r => setTimeout(r, 120));

  try {
    const canvas = await html2canvas(document.getElementById('captura'), { backgroundColor:'#ffffff', scale:2, useCORS:true, allowTaint:true, logging:false });
    imgDataUrl = canvas.toDataURL('image/jpeg', 0.93);
    document.getElementById('preview-img').src = imgDataUrl;
    document.getElementById('modal').classList.add('visible');
  } catch(e) {
    alert('Error al generar imagen. Intenta de nuevo.'); console.error(e);
  }
});

document.getElementById('btn-dl').addEventListener('click', () => {
  const nombre = document.getElementById('nombre').value.trim().replace(/\s+/g,'_');
  const a = document.createElement('a');
  a.href = imgDataUrl;
  a.download = `quiniela_j${jornadaActual}_${nombre}.jpg`;
  a.click();
  toast('¡Descargado! 🎉');
});

document.getElementById('btn-cerrar').addEventListener('click', () => document.getElementById('modal').classList.remove('visible'));
document.getElementById('modal').addEventListener('click', e => { if (e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('visible'); });

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
renderTabs();
renderPartidos();
</script>
</body>
